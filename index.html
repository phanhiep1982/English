<script src="questions.js"></script>

<script>
    function startGame() {
        console.log("Nút Start đã được bấm!");
        
        // Kiểm tra xem file questions.js đã tải được chưa
        if (typeof fullBank === 'undefined') {
            alert("Lỗi: Không tìm thấy file câu hỏi questions.js. Anh kiểm tra lại tên file trên GitHub nhé!");
            console.error("Biến fullBank chưa được định nghĩa.");
            return;
        }

        console.log("Đã tìm thấy kho câu hỏi với " + fullBank.length + " câu.");
        
        const shuffled = [...fullBank].sort(() => 0.5 - Math.random());
        questions = shuffled.slice(0, 20);
        
        if (questions.length === 0) {
            alert("Lỗi: Kho câu hỏi đang trống rỗng!");
            return;
        }

        currentIdx = 0; score = 0; wrongQuestions = []; isReviewMode = false;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        renderQuestion();
    }
</script>
