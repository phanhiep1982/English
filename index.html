<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Vân Học Tiếng Anh Cùng Ba Hiệp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
        body { font-family: 'Nunito', sans-serif; background-color: #fffaf0; }
        .game-card { background: white; border-radius: 24px; box-shadow: 0 12px 0 #fed7aa, 0 10px 20px rgba(0,0,0,0.1); }
        .btn-3d { transition: all 0.1s; border-bottom: 6px solid rgba(0,0,0,0.2); }
        .btn-3d:active { transform: translateY(4px); border-bottom: 0px solid rgba(0,0,0,0.2); }
        .emoji-img { font-size: 5rem; filter: drop-shadow(0 5px 8px rgba(0,0,0,0.15)); }
        .hidden { display: none !important; }
        @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.05); } 70% { transform: scale(0.9); } 100% { transform: scale(1); opacity: 1; } }
        .animate-bounce-in { animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 select-none">

    <div id="start-screen" class="max-w-md w-full text-center animate-bounce-in">
        <div class="bg-white p-10 rounded-3xl shadow-2xl border-b-8 border-orange-200">
            <h1 class="text-4xl font-black text-orange-600 mb-2">THANH VÂN ƠI!</h1>
            <p class="text-gray-600 text-xl mb-8 font-bold">Ba Hiệp chúc con học tốt nhé! ❤️</p>
            <div class="grid grid-cols-2 gap-4 mb-10 text-5xl">
                <span class="animate-bounce" style="animation-delay: 0.1s">🍣</span>
                <span class="animate-bounce" style="animation-delay: 0.3s">🥋</span>
                <span class="animate-bounce" style="animation-delay: 0.5s">🎨</span>
                <span class="animate-bounce" style="animation-delay: 0.7s">🌬️</span>
            </div>
            <button onclick="startGame()" class="btn-3d w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-5 rounded-2xl text-3xl shadow-xl">
                BẮT ĐẦU CHƠI! 🚀
            </button>
        </div>
    </div>

    <div id="game-screen" class="hidden max-w-lg w-full">
        <div class="flex justify-between items-center mb-6 px-2">
            <div class="w-full bg-gray-200 rounded-full h-5 mr-4 border-2 border-white shadow-inner overflow-hidden">
                <div id="progress-bar" class="bg-gradient-to-r from-yellow-400 to-orange-500 h-full transition-all duration-700" style="width: 0%"></div>
            </div>
            <div class="bg-white px-5 py-2 rounded-2xl font-black text-orange-600 border-b-4 border-orange-100 shadow-sm">
                <span id="score">0</span> 🏆
            </div>
        </div>

        <div class="game-card p-8 mb-6 min-h-[450px] flex flex-col justify-center relative overflow-hidden text-center">
            <div id="review-badge" class="hidden absolute top-0 right-0 bg-red-500 text-white text-sm font-black px-5 py-2 rounded-bl-2xl z-10 shadow-lg">ÔN TẬP CHO VÂN</div>
            <div id="question-count" class="absolute top-0 left-0 bg-orange-100 text-orange-700 text-sm font-black px-4 py-2 rounded-br-2xl">Câu: 1/20</div>
            <div id="question-area" class="w-full mt-6"></div>
        </div>

        <div id="feedback-overlay" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-6 backdrop-blur-md">
            <div id="feedback-box" class="bg-white rounded-[40px] p-10 text-center max-w-sm w-full shadow-2xl animate-bounce-in border-b-[12px]">
                <div id="feedback-icon" class="text-8xl mb-6"></div>
                <h2 id="feedback-text" class="text-4xl font-black mb-3"></h2>
                <p id="feedback-sub" class="text-gray-700 text-xl font-bold mb-8"></p>
                <button onclick="nextQuestion()" class="btn-3d w-full py-5 rounded-2xl text-2xl font-black text-white shadow-lg" id="feedback-btn">Tiếp tục nào!</button>
            </div>
        </div>
    </div>

    <div id="end-screen" class="hidden max-w-md w-full text-center animate-bounce-in">
        <div class="bg-white p-10 rounded-3xl shadow-2xl border-b-8 border-purple-200">
            <h1 class="text-5xl font-black text-purple-600 mb-4 text-center">GIỎI QUÁ!</h1>
            <div class="text-9xl mb-8">🥇</div>
            <p id="final-score-text" class="text-gray-700 text-2xl mb-10 font-black"></p>
            <button onclick="location.reload()" class="btn-3d w-full bg-green-500 hover:bg-green-600 text-white font-black py-5 rounded-2xl text-2xl shadow-xl">CHƠI LẠI VỚI BA 🔄</button>
        </div>
    </div>

    <script>
        // KHO CÂU HỎI TỔNG HỢP (50 CÂU)
        const fullBank = [
            // CẢM XÚC & CƠ THỂ
            { type: 'match', q: 'Happy', a: '😊', options: ['😊', '😢', '😡', '😴'], sound: 'Happy' },
            { type: 'match', q: 'Sad', a: '😢', options: ['😊', '😢', '😡', '😴'], sound: 'Sad' },
            { type: 'quiz', q: 'Thanh Vân ơi, sợ hãi tiếng Anh là gì?', img: '😨', a: 'Scared', options: ['Happy', 'Angry', 'Scared', 'Sleepy'], sound: 'Scared' },
            { type: 'tf', q: 'Sleepy (Buồn ngủ)', img: '😴', a: true, sound: 'Sleepy' },
            { type: 'tf', q: 'Thirsty (Khát nước)', img: '🍕', a: false, sound: 'Thirsty' },
            { type: 'scramble', q: 'Con có đói không?', a: "Are you hungry?", parts: ["Are", "you", "hungry?"], sound: "Are you hungry?" },

            // NHÀ CỬA & VIỆC NHÀ
            { type: 'quiz', q: 'Phòng ngủ của Thanh Vân là?', img: '🛌', a: 'Bedroom', options: ['Kitchen', 'Bedroom', 'Yard', 'Hall'], sound: 'Bedroom' },
            { type: 'match', q: 'Kitchen', a: '🍳', options: ['🚿', '🍳', '🛋️', '🌳'], sound: 'Kitchen' },
            { type: 'match', q: 'Bathroom', a: '🚿', options: ['🚿', '🛌', '🛋️', '🌳'], sound: 'Bathroom' },
            { type: 'scramble', q: 'Dọn dẹp giường ngủ.', a: "Make the bed", parts: ["Make", "the", "bed"], sound: "Make the bed" },
            { type: 'quiz', q: 'Hút bụi thảm là?', img: '🧹', a: 'Vacuum the carpet', options: ['Wash dishes', 'Vacuum the carpet', 'Rake leaves', 'Wipe table'], sound: 'Vacuum the carpet' },

            // THỜI TIẾT
            { type: 'match', q: 'Sunny (Nắng)', a: '☀️', options: ['☀️', '🌧️', '❄️', '🌬️'], sound: 'Sunny' },
            { type: 'quiz', q: 'Trời có nhiều sương mù?', img: '🌫️', a: 'Foggy', options: ['Sunny', 'Foggy', 'Windy', 'Rainy'], sound: 'Foggy' },
            { type: 'tf', q: 'Rainy (Mưa)', img: '🌧️', a: true, sound: 'Rainy' },
            { type: 'scramble', q: 'Hôm nay trời thế nào?', a: "What's the weather like?", parts: ["What's", "the", "weather", "like?"], sound: "What's the weather like?" },

            // TRƯỜNG HỌC & LỚP HỌC
            { type: 'match', q: 'Art class', a: '🎨', options: ['🎨', '📐', '⚽', '🏊'], sound: 'Art class' },
            { type: 'quiz', q: 'Thanh Vân học viết thư pháp?', img: '🖌️', a: 'Calligraphy class', options: ['Math', 'Judo', 'Calligraphy', 'Art'], sound: 'Calligraphy class' },
            { type: 'tf', q: 'Judo practice', img: '🥋', a: true, sound: 'Judo practice' },
            { type: 'scramble', q: 'Thanh Vân đang đi tập múa.', a: "Going to dance class", parts: ["Going", "to", "dance", "class"], sound: "Going to dance class" },

            // ĂN UỐNG & QUỐC TẾ
            { type: 'match', q: 'Spaghetti (Ý)', a: '🍝', options: ['🍣', '🍝', '🌮', '🌭'], sound: 'Spaghetti' },
            { type: 'match', q: 'Sushi (Japan)', a: '🍣', options: ['🍣', '🥟', '🌮', '🌭'], sound: 'Sushi' },
            { type: 'quiz', q: 'Món bánh Tacos của nước nào?', img: '🌮', a: 'Mexico', options: ['China', 'Japan', 'Korea', 'Mexico'], sound: 'Mexico' },
            { type: 'scramble', q: 'Con muốn ăn mì.', a: "I want noodles", parts: ["I", "want", "noodles"], sound: "I want noodles" },
            { type: 'quiz', q: 'Con có biết dùng đũa không?', a: 'Can you use chopsticks?', options: ['use chopsticks?', 'eat fruit?', 'drink juice?', 'want fish?'], sound: 'Can you use chopsticks?' },
            
            // ĐỒ VẬT & PHONICS
            { type: 'quiz', q: 'Cái kéo tiếng Anh là?', img: '✂️', a: 'Scissors', options: ['Paints', 'Scissors', 'Erasers', 'Markers'], sound: 'Scissors' },
            { type: 'tf', q: 'In the box (Trong hộp)', img: '📦', a: true, sound: 'In the box' },
            { type: 'quiz', q: 'Đánh vần từ "Con mèo" (Cat)?', img: '🐱', a: 'c-a-t', options: ['d-o-g', 'c-a-t', 'f-o-x', 'b-i-g'], sound: 'cat' },
            { type: 'tf', q: 'Bell (Có vần -ell)', img: '🔔', a: true, sound: 'Bell' }
        ];

        let questions = [];
        let wrongQuestions = [];
        let currentIdx = 0;
        let score = 0;
        let isReviewMode = false;
        const synth = window.speechSynthesis;

        function speak(text, lang='en-US') {
            if (synth.speaking) synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = lang;
            utter.rate = 0.95;
            synth.speak(utter);
        }

        function startGame() {
            const shuffled = [...fullBank].sort(() => 0.5 - Math.random());
            questions = shuffled.slice(0, 20);
            currentIdx = 0; score = 0; wrongQuestions = []; isReviewMode = false;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            speak("Chào Thanh Vân, ba Hiệp cùng con học nhé!", 'vi-VN');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentIdx];
            const area = document.getElementById('question-area');
            document.getElementById('progress-bar').style.width = `${(currentIdx/questions.length)*100}%`;
            document.getElementById('question-count').innerText = `Câu: ${currentIdx + 1}/${questions.length}`;
            document.getElementById('review-badge').classList.toggle('hidden', !isReviewMode);

            if(q.sound) setTimeout(() => speak(q.sound), 600);

            let html = '';
            switch(q.type) {
                case 'match':
                    html = `<h2 class="text-2xl font-black mb-8 text-gray-700">Tìm hình cho từ:<br><span class="text-orange-600 text-6xl mt-2 block">${q.q}</span></h2>
                            <div class="grid grid-cols-2 gap-5">${q.options.map(opt => `<button onclick="checkAnswer('${opt}', '${q.a}')" class="btn-3d bg-orange-50 p-6 emoji-img rounded-3xl border-2 border-orange-100">${opt}</button>`).join('')}</div>`;
                    break;
                case 'quiz':
                    html = `<h2 class="text-3xl font-black mb-6 text-gray-700 leading-tight">${q.q}</h2><div class="emoji-img mb-8 animate-bounce">${q.img || '❓'}</div>
                            <div class="grid grid-cols-1 gap-4">${q.options.map(opt => `<button onclick="checkAnswer('${opt.replace(/'/g, "\\'")}', '${q.a.replace(/'/g, "\\")}')" class="btn-3d bg-white border-2 border-orange-100 font-black py-5 rounded-2xl text-2xl text-gray-700">${opt}</button>`).join('')}</div>`;
                    break;
                case 'tf':
                    html = `<h2 class="text-2xl font-black mb-6 text-gray-700">Thanh Vân thấy đúng hay sai?</h2><div class="emoji-img mb-6">${q.img}</div><h3 class="text-5xl font-black text-orange-600 mb-10">${q.q}</h3>
                            <div class="flex gap-5"><button onclick="checkAnswer('true', '${q.a}')" class="flex-1 btn-3d bg-green-500 text-white font-black py-6 rounded-3xl text-3xl">ĐÚNG ✅</button>
                            <button onclick="checkAnswer('false', '${q.a}')" class="flex-1 btn-3d bg-red-500 text-white font-black py-6 rounded-3xl text-3xl">SAI ❌</button></div>`;
                    break;
                case 'scramble':
                    const shufParts = [...q.parts].sort(() => 0.5 - Math.random());
                    html = `<h2 class="text-2xl font-black mb-8 text-gray-600">Sắp xếp cho ba:<br><span class="text-orange-600 text-3xl">"${q.q}"</span></h2>
                            <div id="drop-zone" class="bg-orange-50 rounded-3xl p-6 min-h-[100px] flex flex-wrap gap-3 mb-8 border-2 border-dashed border-orange-200 justify-center items-center"></div>
                            <div class="flex flex-wrap gap-3 justify-center">${shufParts.map(p => `<button onclick="selectWord(this)" class="btn-3d bg-yellow-100 px-6 py-3 rounded-xl font-black text-2xl text-orange-800">${p}</button>`).join('')}</div>
                            <div class="mt-10"><button onclick="checkScramble('${q.a.replace(/'/g, "\\'")}')" class="btn-3d bg-orange-500 text-white px-12 py-4 rounded-full font-black text-3xl shadow-lg">Kiểm tra nào!</button></div>`;
                    break;
            }
            area.innerHTML = html;
        }

        let currentSentence = [];
        function selectWord(btn) {
            currentSentence.push(btn.innerText);
            btn.classList.add('opacity-0', 'pointer-events-none');
            const span = document.createElement('span');
            span.className = "bg-white border-2 border-orange-200 px-4 py-2 rounded-xl font-black text-orange-700 animate-bounce-in text-2xl";
            span.innerText = btn.innerText;
            document.getElementById('drop-zone').appendChild(span);
        }

        function checkScramble(correct) {
            const user = currentSentence.join(' ').replace(/[?.,!]/g, '').toLowerCase();
            const real = correct.replace(/[?.,!]/g, '').toLowerCase();
            checkAnswer(user, real);
            currentSentence = [];
        }

        function checkAnswer(user, correct) {
            const isCorrect = String(user).toLowerCase() === String(correct).toLowerCase();
            const overlay = document.getElementById('feedback-overlay');
            overlay.classList.remove('hidden');
            
            const praiseVân = [
                "Thanh Vân giỏi quá xá!",
                "Hoan hô Thanh Vân của ba!",
                "Thanh Vân làm ba tự hào quá!",
                "Đúng rồi, Thanh Vân tuyệt vời!",
                "Thanh Vân xuất sắc quá con ơi!"
            ];
            
            const remindVân = [
                "Thanh Vân cố lên, sắp đúng rồi!",
                "Không sao đâu Thanh Vân, thử lại nhé!",
                "Ba tin Thanh Vân sẽ làm được câu này!",
                "Tiếc quá Thanh Vân ơi, tập trung xíu nữa nhé!",
                "Thanh Vân ơi, con làm lại câu này cho nhớ nhé!"
            ];

            if (isCorrect) {
                score += 10;
                document.getElementById('score').innerText = score;
                document.getElementById('feedback-box').className = "bg-white rounded-[40px] p-10 text-center max-w-sm w-full shadow-2xl animate-bounce-in border-b-[12px] border-green-400";
                document.getElementById('feedback-icon').innerHTML = "🌟";
                document.getElementById('feedback-text').innerText = "TUYỆT VỜI!";
                document.getElementById('feedback-sub').innerText = "Thanh Vân làm đúng rồi đó!";
                document.getElementById('feedback-btn').className = "btn-3d w-full py-5 rounded-2xl text-2xl font-black bg-green-500 text-white";
                speak(praiseVân[Math.floor(Math.random()*praiseVân.length)], 'vi-VN');
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
            } else {
                if(!isReviewMode) wrongQuestions.push(questions[currentIdx]);
                document.getElementById('feedback-box').className = "bg-white rounded-[40px] p-10 text-center max-w-sm w-full shadow-2xl animate-bounce-in border-b-[12px] border-red-400";
                document.getElementById('feedback-icon').innerHTML = "💪";
                document.getElementById('feedback-text').innerText = "CỐ LÊN CON!";
                document.getElementById('feedback-sub').innerText = `Đáp án là: ${correct}`;
                document.getElementById('feedback-btn').className = "btn-3d w-full py-5 rounded-2xl text-2xl font-black bg-red-500 text-white";
                speak(remindVân[Math.floor(Math.random()*remindVân.length)], 'vi-VN');
            }
        }

        function nextQuestion() {
            document.getElementById('feedback-overlay').classList.add('hidden');
            currentIdx++;
            if (currentIdx < questions.length) {
                renderQuestion();
            } else if (wrongQuestions.length > 0 && !isReviewMode) {
                isReviewMode = true; questions = [...wrongQuestions]; wrongQuestions = []; currentIdx = 0;
                speak("Bây giờ Thanh Vân cùng ba ôn lại những câu chưa đúng nhé!", 'vi-VN');
                renderQuestion();
            } else {
                document.getElementById('game-screen').classList.add('hidden');
                document.getElementById('end-screen').classList.remove('hidden');
                document.getElementById('final-score-text').innerText = `Thanh Vân đã đạt được ${score} điểm! Ba yêu con!`;
                speak("Chúc mừng Thanh Vân đã hoàn thành bài học hôm nay. Ba yêu con rất nhiều!", 'vi-VN');
            }
        }
    </script>
</body>
</html>
